name: multi-agent-system

services:
  supervisor:
    build: .
    image: multi-agent-system:latest
    volumes:
      - tasks:/app/tasks
      - workspaces:/app/projects
      - ./orchestrator.yml:/orchestrator.yml:ro
    environment:
      - GITHUB_TOKEN
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped

  hunter:
    image: multi-agent-system:latest
    entrypoint: ["/hunter"]
    environment:
      - SAM_API_KEY
    profiles:
      - hunt
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  tasks:
  workspaces:
