name: Deploy to Staging

on:
  push:
    branches: [master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -race -cover ./...

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build supervisor binary (linux/amd64)
        run: GOOS=linux GOARCH=amd64 go build -o bin/supervisor ./cmd/supervisor

      - uses: actions/upload-artifact@v4
        with:
          name: supervisor-linux-amd64
          path: bin/supervisor
          retention-days: 7

  deploy-staging:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: supervisor-linux-amd64
          path: bin/

      - name: Deploy supervisor to staging
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          echo "$STAGING_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          chmod +x bin/supervisor
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            bin/supervisor "$STAGING_USER@$STAGING_HOST:/opt/multi-agent-system/supervisor.new"
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no "$STAGING_USER@$STAGING_HOST" \
            "mv /opt/multi-agent-system/supervisor.new /opt/multi-agent-system/supervisor && sudo systemctl restart multi-agent-system"
          rm /tmp/deploy_key

      - name: Verify staging deployment
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          echo "$STAGING_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no "$STAGING_USER@$STAGING_HOST" \
            "sudo systemctl is-active multi-agent-system"
          rm /tmp/deploy_key
